// Helper: map DB row → app trade object
function dbToTrade(r){
  return {
    id: r.id, date: r.trade_date, account: r.account_name||'',
    symbol: r.symbol, direction: r.direction, session: r.session||'',
    month: r.month||'', year: r.year||2025,
    grossPnl: parseFloat(r.gross_pnl)||0, fees: parseFloat(r.fees)||0,
    netPnl: parseFloat(r.net_pnl)||0, setupGrade: r.setup_grade||'',
    result: r.result||'LOSS', riskPct: parseFloat(r.risk_pct)||1,
    rr: parseFloat(r.rr_achieved)||0, bias: r.bias||'',
    model: r.model||'Model #2', notes: r.notes||'',
    screenshot: r.screenshot_url||null,
    htfBias: r.htf_bias||'', htfPoi: r.htf_poi||'',
    ltfEntry: r.ltf_entry||'', entrySignal: r.entry_signal||'',
    entryTF: r.entry_tf||'1 minute',
    stopLossPips: r.stop_loss_pips||'', takeProfitPips: r.take_profit_pips||'',
    confluences: r.confluences||[], partialsTaken: r.partials_taken||false,
    partialsNote: r.partials_note||'', preTradeEmotion: r.pre_trade_emotion||'Calm',
    postTradeReflection: r.post_trade_reflection||'',
    mistake: r.is_mistake?1:0, mistakeTypes: r.mistake_types||[],
    mistakeType: (r.mistake_types||[]).join(' + '),
  };
}
function tradeToDb(t, userId){
  const d = new Date(t.date.replace(/\//g,'-'));
  return {
    user_id: userId,
    account_name: t.account, symbol: t.symbol, direction: t.direction,
    session: t.session, trade_date: t.date.replace(/\//g,'-'),
    month: t.month, year: t.year||d.getFullYear(),
    gross_pnl: t.grossPnl, fees: t.fees, net_pnl: t.netPnl,
    setup_grade: t.setupGrade, result: t.result,
    risk_pct: t.riskPct, rr_achieved: t.rr, bias: t.bias, model: t.model,
    notes: t.notes, screenshot_url: t.screenshot||null,
    htf_bias: t.htfBias||null, htf_poi: t.htfPoi||null,
    ltf_entry: t.ltfEntry||null, entry_signal: t.entrySignal||null,
    entry_tf: t.entryTF||null,
    stop_loss_pips: t.stopLossPips||null, take_profit_pips: t.takeProfitPips||null,
    confluences: t.confluences||[], partials_taken: t.partialsTaken||false,
    partials_note: t.partialsNote||null,
    pre_trade_emotion: t.preTradeEmotion||null,
    post_trade_reflection: t.postTradeReflection||null,
    is_mistake: t.mistake===1||t.mistake===true,
    mistake_types: t.mistakeTypes||[],
  };
}
function dbToAccount(r){
  return {
    id: r.id, name: r.name, broker: r.broker||'', type: r.account_type||'Prop Firm',
    startingBalance: parseFloat(r.starting_balance)||0, status: r.status||'Active',
    maxDrawdown: parseFloat(r.max_drawdown)||0, dailyLossLimit: parseFloat(r.daily_loss_limit)||0,
  };
}
function accountToDb(a, userId){
  return {
    user_id: userId, name: a.name, broker: a.broker||null,
    account_type: a.type||'Prop Firm',
    starting_balance: a.startingBalance||0, status: a.status||'Active',
    max_drawdown: a.maxDrawdown||0, daily_loss_limit: a.dailyLossLimit||0,
  };
}

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@300;400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a0a0a;
  color:#e8edf5;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0d0d0d}
::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
.app{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:230px;min-width:230px;background:#0d0d0d;border-right:1px solid #1e1e1e;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:22px 20px;border-bottom:1px solid #222;display:flex;align-items:center;gap:13px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#1560ff,#0a3db5);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;letter-spacing:.5px;box-shadow:0 0 20px rgba(21,96,255,.4)}
.logo-text{font-size:19px;font-weight:800;color:#fff;letter-spacing:3px;text-transform:uppercase;font-family:'Plus Jakarta Sans',sans-serif}
.logo-sub{font-size:10px;color:#333;letter-spacing:.04em;font-weight:400;margin-top:1px}
.nav{padding:16px 10px;flex:1}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:10px 14px;border-radius:10px;cursor:pointer;
  color:#444;font-size:13px;font-weight:500;
  transition:all .18s;border:none;background:none;
  width:100%;text-align:left;font-family:inherit;
  letter-spacing:.01em;
}
.nav-item:hover{color:#ccc;background:#181818}
.nav-item.active{
  color:#fff;
  background:linear-gradient(90deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
  border-left:2px solid #1560ff;
  font-weight:600;
}
.nav-item .nav-icon{font-size:14px;width:18px;text-align:center;opacity:.8}
.sidebar-stats{padding:16px;border-top:1px solid #222}
.stat-label{color:#333;font-size:11px;font-weight:500}
.stat-row{display:flex;justify-content:space-between;margin-bottom:7px;font-size:11px}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{
  position:sticky;top:0;z-index:10;
  background:rgba(10,10,10,.96);backdrop-filter:blur(16px);
  border-bottom:1px solid #222;
  padding:14px 26px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.page-title{color:#fff;font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:20px}
.topbar-stat{font-size:12px;color:#444;font-weight:500}
.content{flex:1;overflow-y:auto;padding:24px}

/* ── BUTTONS ── */
.btn{
  padding:9px 18px;border-radius:9px;font-size:12px;font-weight:600;
  cursor:pointer;border:none;transition:all .18s;
  font-family:inherit;letter-spacing:.02em;
}
.btn-primary{
  background:linear-gradient(135deg,#1560ff,#0a3db5);
  color:#fff;box-shadow:0 2px 14px rgba(21,96,255,.35);
}
.btn-primary:hover{
  background:linear-gradient(135deg,#2a70ff,#1550d0);
  box-shadow:0 4px 22px rgba(21,96,255,.5);
  transform:translateY(-1px);
}
.btn-primary:disabled{background:#181818;color:#333;cursor:not-allowed;box-shadow:none;transform:none}
.btn-ghost{background:none;border:1px solid #222;color:#444;font-weight:500}
.btn-ghost:hover{border-color:#1560ff;color:#ccc}
.btn-sm{padding:6px 13px;font-size:11px}

/* ── CARDS ── */
.card{background:#111;border:1px solid #222;border-radius:14px;padding:22px}
.card-title{
  font-size:11px;font-weight:700;color:#888;
  margin-bottom:18px;text-transform:uppercase;
  letter-spacing:.1em;
}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi-card{
  background:#111;border:1px solid #222;border-radius:14px;padding:20px;
  position:relative;overflow:hidden;
  transition:border-color .2s;
}
.kpi-card:hover{border-color:#1a3a60}
.kpi-card::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#1560ff,transparent)}
.kpi-label{
  font-size:10px;color:#444;text-transform:uppercase;
  letter-spacing:.12em;margin-bottom:8px;font-weight:600;
}
.kpi-value{
  font-size:26px;font-weight:700;
  font-family:'DM Mono','Courier New',monospace;
  line-height:1;letter-spacing:-.02em;
}
.kpi-sub{font-size:11px;color:#333;margin-top:6px;font-weight:400}

/* ── COLORS ── */
.green{color:#22d3a0}.red{color:#f44060}.amber{color:#f59e0b}
.blue{color:#3b9eff}.purple{color:#a78bfa}.white{color:#e8edf5}
.muted{color:#888}.dim{color:#444}

/* ── BADGES ── */
.badge{
  display:inline-block;font-size:10px;font-weight:600;
  padding:3px 9px;border-radius:6px;border:1px solid;
  letter-spacing:.03em;font-family:'Plus Jakarta Sans',sans-serif;
}
.badge-green{background:rgba(34,211,160,.08);color:#22d3a0;border-color:rgba(34,211,160,.22)}
.badge-red{background:rgba(244,64,96,.08);color:#f44060;border-color:rgba(244,64,96,.22)}
.badge-gray{background:#181818;color:#555;border-color:#222}
.badge-amber{background:rgba(245,158,11,.08);color:#f59e0b;border-color:rgba(245,158,11,.22)}
.badge-blue{background:rgba(59,158,255,.08);color:#3b9eff;border-color:rgba(59,158,255,.22)}
.badge-purple{background:rgba(167,139,250,.08);color:#a78bfa;border-color:rgba(167,139,250,.22)}
.badge-orange{background:rgba(251,113,33,.08);color:#fb7121;border-color:rgba(251,113,33,.22)}

/* ── MISTAKE TYPE CHIPS ── */
.mk-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.mk-chip{
  padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;
  cursor:pointer;border:1px solid;transition:all .18s;
  font-family:inherit;letter-spacing:.01em;
}
.mk-chip.psych{border-color:#a78bfa;color:#a78bfa;background:rgba(167,139,250,.05)}
.mk-chip.psych.active{background:rgba(167,139,250,.2);color:#fff;box-shadow:0 0 12px rgba(167,139,250,.2)}
.mk-chip.risk{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,.05)}
.mk-chip.risk.active{background:rgba(245,158,11,.2);color:#fff;box-shadow:0 0 12px rgba(245,158,11,.2)}
.mk-chip.exec{border-color:#3b9eff;color:#3b9eff;background:rgba(59,158,255,.05)}
.mk-chip.exec.active{background:rgba(59,158,255,.2);color:#fff;box-shadow:0 0 12px rgba(59,158,255,.2)}
.mk-chip.mread{border-color:#fb7121;color:#fb7121;background:rgba(251,113,33,.05)}
.mk-chip.mread.active{background:rgba(251,113,33,.2);color:#fff;box-shadow:0 0 12px rgba(251,113,33,.2)}

/* ── TABLE ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:960px}
thead tr{border-bottom:1px solid #222;background:#080808}
th{
  text-align:left;padding:11px 13px;
  font-size:10px;color:#444;text-transform:uppercase;
  letter-spacing:.1em;white-space:nowrap;font-weight:700;
}
tbody tr{border-bottom:1px solid #04090f;transition:background .12s}
tbody tr:hover{background:rgba(255,255,255,.03)}
td{padding:11px 13px;font-size:13px;white-space:nowrap;color:#ccc}
.table-foot{
  padding:12px 18px;border-top:1px solid #222;
  display:flex;justify-content:space-between;align-items:center;
  font-size:12px;color:#444;font-weight:500;
}

/* ── GRID ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.88);
  backdrop-filter:blur(8px);z-index:50;
  display:flex;align-items:center;justify-content:center;padding:16px;
}
.modal{
  background:#0a0a0a;border:1px solid #222;border-radius:18px;
  width:100%;max-width:700px;max-height:92vh;
  display:flex;flex-direction:column;
  box-shadow:0 40px 100px rgba(0,0,0,.9);
}
.modal-header{
  padding:20px 26px;border-bottom:1px solid #222;
  display:flex;justify-content:space-between;align-items:center;
}
.modal-header span{font-size:14px;font-weight:700;color:#e8edf5;letter-spacing:.04em}
.modal-close{
  background:none;border:none;color:#444;
  font-size:24px;cursor:pointer;line-height:1;padding:2px 6px;
  transition:color .15s;border-radius:6px;
}
.modal-close:hover{color:#e8edf5;background:#181818}
.modal-body{padding:26px;overflow-y:auto;flex:1}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:span 2}
.form-label{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.1em;font-weight:700}
.form-input,.form-select,.form-textarea{
  background:#111;border:1px solid #222;border-radius:10px;
  padding:10px 14px;font-size:13px;color:#e8edf5;
  font-family:inherit;outline:none;transition:border .18s,box-shadow .18s;width:100%;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{
  border-color:#1560ff;box-shadow:0 0 0 3px rgba(21,96,255,.1);
}
.form-input::placeholder{color:#222}
.form-select option{background:#0a0a0a}
.form-textarea{resize:vertical;min-height:60px}
.form-actions{display:flex;gap:12px;margin-top:24px}
.form-actions .btn{flex:1;padding:12px}
.form-section-title{
  font-size:10px;font-weight:700;color:#444;
  text-transform:uppercase;letter-spacing:.12em;
  margin:4px 0 4px;border-top:1px solid #222;
  padding-top:18px;grid-column:span 2;
}
.mistake-toggle{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;background:#111;
  border:1px solid #222;border-radius:12px;
  cursor:pointer;transition:all .18s;
}
.mistake-toggle:hover{border-color:#1a3a60}
.mistake-toggle.active{border-color:#f44060;background:rgba(244,64,96,.05)}
.toggle-dot{
  width:18px;height:18px;border-radius:50%;
  border:2px solid #2a2a2a;transition:all .2s;flex-shrink:0;
}
.mistake-toggle.active .toggle-dot{
  background:#f44060;border-color:#f44060;
  box-shadow:0 0 10px rgba(244,64,96,.45);
}

/* ── PROGRESS ── */
.progress-track{height:4px;background:#181818;border-radius:2px;overflow:hidden;margin-top:6px}
.progress-bar{height:100%;border-radius:2px;transition:width .4s}

/* ── FILTERS ── */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;justify-content:space-between}
.filter-left{display:flex;gap:8px;flex-wrap:wrap}

/* ── CALENDAR ── */
.cal-nav{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:24px;
}
.cal-month-label{
  font-size:22px;font-weight:700;color:#e8edf5;
  letter-spacing:-.01em;
}
.cal-year-label{font-size:15px;color:#444;font-weight:500;margin-left:8px}
/* 7 day cols + 1 week PnL col */
.cal-header-row{display:grid;grid-template-columns:repeat(7,1fr) 80px;gap:6px;margin-bottom:2px}
.cal-row{display:grid;grid-template-columns:repeat(7,1fr) 80px;gap:6px;margin-bottom:6px}
.cal-day-label{
  text-align:center;font-size:12px;color:#444;
  text-transform:uppercase;padding:6px 0 10px;
  font-weight:700;letter-spacing:.06em;
}
.cal-week-label{
  text-align:center;font-size:11px;color:#1560ff;
  text-transform:uppercase;padding:6px 0 10px;
  font-weight:700;letter-spacing:.04em;
}
.cal-day{
  aspect-ratio:1;border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:14px;border:1px solid transparent;
  transition:all .15s;cursor:default;
  position:relative;
}
.cal-day-num{font-weight:600;line-height:1;color:#888}
.cal-day.has-win{
  background:rgba(34,211,160,.1);
  border-color:rgba(34,211,160,.22);
}
.cal-day.has-win .cal-day-num{color:#e8edf5;font-weight:700}
.cal-day.has-loss{
  background:rgba(244,64,96,.1);
  border-color:rgba(244,64,96,.22);
}
.cal-day.has-loss .cal-day-num{color:#e8edf5;font-weight:700}
.cal-day.no-trade{background:#111}
.cal-day.no-trade:hover{background:#181818;border-color:#222}
.cal-pnl{
  font-size:10px;font-family:'DM Mono','Courier New',monospace;
  margin-top:4px;font-weight:600;letter-spacing:-.02em;
}
.cal-dot{
  width:5px;height:5px;border-radius:50%;margin-top:3px;
}
.cal-week-cell{
  aspect-ratio:unset;border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:1px solid transparent;transition:all .15s;
  padding:6px 4px;gap:3px;
}
.cal-week-cell.wk-pos{background:rgba(34,211,160,.08);border-color:rgba(34,211,160,.2)}
.cal-week-cell.wk-neg{background:rgba(244,64,96,.08);border-color:rgba(244,64,96,.2)}
.cal-week-cell.wk-zero{background:#111;border-color:#222}
.cal-week-pnl{
  font-family:'DM Mono',monospace;font-size:11px;font-weight:700;
  letter-spacing:-.02em;line-height:1;
}
.cal-week-sub{font-size:9px;color:#444;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.cal-summary{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  margin-top:20px;padding-top:20px;border-top:1px solid #222;
}
.cal-summary-item{text-align:center}
.cal-summary-val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace}
.cal-summary-lbl{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-top:4px}
.cal-day-list{margin-top:20px}
.cal-day-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:13px 0;border-bottom:1px solid #071428;
}
.cal-day-date{font-size:14px;color:#888;font-weight:500}
.cal-day-count{font-size:12px;color:#333;font-weight:500}
.cal-day-pnl{font-family:'DM Mono',monospace;font-size:15px;font-weight:700}

/* ── ACCOUNT CARD ── */
.acc-card{background:#111;border:1px solid #222;border-radius:14px;padding:20px}
.acc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.acc-name{font-size:15px;font-weight:700;color:#e8edf5}
.acc-sub{font-size:11px;color:#444;margin-top:3px;font-weight:400}
.acc-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.acc-metric{background:#0a0a0a;border-radius:10px;padding:12px;border:1px solid #071428}
.acc-metric-label{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.1em;font-weight:700}
.acc-metric-value{font-size:17px;font-weight:700;font-family:'DM Mono',monospace;margin-top:4px}
.acc-counts{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.acc-count{background:#0a0a0a;border-radius:10px;padding:10px;text-align:center;border:1px solid #071428}
.acc-count-num{font-size:20px;font-weight:700}
.acc-count-lbl{font-size:9px;color:#444;font-weight:700;letter-spacing:.05em;text-transform:uppercase}

/* ── INSIGHT CARDS ── */
.insight-card{border-radius:14px;padding:20px}
.insight-card.strengths{background:#111;border:1px solid rgba(34,211,160,.18)}
.insight-card.weaknesses{background:#111;border:1px solid rgba(244,64,96,.18)}
.insight-card.coaching{background:#111;border:1px solid rgba(59,158,255,.18)}
.insight-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}

<body>

<div id="root"></div>
<script type="text/babel">
const {useState,useCallback} = React;

// ── DATA ──────────────────────────────────────────────────────────────────────
const INIT_TRADES = [];
const INIT_ACCOUNTS = [];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const MK_TYPES=[
  {key:"Psychology",cls:"psych",icon:"🧠",color:"#a78bfa",bg:"rgba(167,139,250,.15)"},
  {key:"Risk",cls:"risk",icon:"⚡",color:"#f59e0b",bg:"rgba(245,158,11,.15)"},
  {key:"Execution",cls:"exec",icon:"🎯",color:"#3b9eff",bg:"rgba(59,158,255,.15)"},
  {key:"Market Read",cls:"mread",icon:"📊",color:"#fb7121",bg:"rgba(251,113,33,.15)"},
];

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmt$(v){return(v>=0?"$":"-$")+Math.abs(Math.round(v)).toLocaleString()}
function pct(v){return(v*100).toFixed(1)+"%"}
function pCol(v){return v>0?"green":v<0?"red":"dim"}
function getMkLabel(t){return t.mistake?(t.mistakeTypes||[]).join(", ")||"Mistake":"Clean"}

function calcGlobal(trades){
  const wins=trades.filter(t=>t.result==="WIN"),losses=trades.filter(t=>t.result==="LOSS");
  const netPnl=trades.reduce((s,t)=>s+t.netPnl,0);
  const gW=wins.reduce((s,t)=>s+t.netPnl,0),gL=Math.abs(losses.reduce((s,t)=>s+t.netPnl,0));
  const pf=gL>0?gW/gL:wins.length>0?Infinity:0;
  const wr=trades.length>0?wins.length/trades.length:0;
  const avgW=wins.length>0?gW/wins.length:0,avgL=losses.length>0?-(gL/losses.length):0;
  const exp=wr*avgW+(1-wr)*avgL;
  const cleanTrades=trades.filter(t=>!t.mistake);
  const dr=trades.length>0?cleanTrades.length/trades.length:0;
  const mkCost=trades.filter(t=>t.mistake).reduce((s,t)=>s+t.netPnl,0);
  const cleanPnl=cleanTrades.reduce((s,t)=>s+t.netPnl,0);
  return{total:trades.length,wins:wins.length,losses:losses.length,be:trades.length-wins.length-losses.length,netPnl,gW,gL,pf,wr,avgW,avgL,exp,dr,mkCost,cleanPnl};
}
function calcAccount(acc,trades){
  const at=trades.filter(t=>t.account===acc.name);
  const wins=at.filter(t=>t.result==="WIN"),losses=at.filter(t=>t.result==="LOSS");
  const netPnl=at.reduce((s,t)=>s+t.netPnl,0);
  const gW=wins.reduce((s,t)=>s+t.netPnl,0),gL=Math.abs(losses.reduce((s,t)=>s+t.netPnl,0));
  const pf=gL>0?gW/gL:wins.length>0?Infinity:0;
  const wr=at.length>0?wins.length/at.length:0;
  const bal=acc.startingBalance+netPnl,ddPct=(netPnl/acc.startingBalance)*100;
  let health="Stable";
  if(netPnl>0)health="Growing"; else if(Math.abs(netPnl)>acc.maxDrawdown)health="At Risk"; else if(netPnl<0)health="In Drawdown";
  return{total:at.length,wins:wins.length,losses:losses.length,be:at.length-wins.length-losses.length,netPnl,bal,wr,pf,mistakes:at.filter(t=>t.mistake).length,health,ddPct};
}

// ── EQUITY CURVE ─────────────────────────────────────────────────────────────
function EquityCurve({trades,height=120}){
  const sorted=[...trades].sort((a,b)=>a.date.localeCompare(b.date));
  let cum=0;const pts=[0,...sorted.map(t=>(cum+=t.netPnl,cum))];
  const mn=Math.min(...pts),mx=Math.max(...pts),range=mx-mn||1;
  const W=400,H=height,x=i=>(i/(pts.length-1))*W,y=v=>H-((v-mn)/range)*(H-8)-4;
  const d=pts.map((v,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const col=pts[pts.length-1]>=0?"#22d3a0":"#f44060";
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height}}>
      <defs><linearGradient id="eq" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={col} stopOpacity="0.25"/><stop offset="100%" stopColor={col} stopOpacity="0"/></linearGradient></defs>
      <path d={d+` L${x(pts.length-1)},${H} L0,${H}Z`} fill="url(#eq)"/>
      <path d={d} fill="none" stroke={col} strokeWidth="2"/>
    </svg>
  );
}

// ── BADGES ───────────────────────────────────────────────────────────────────
function Badge({text,cls}){return <span className={`badge badge-${cls}`}>{text}</span>}
function ResultBadge({r}){return r==="WIN"?<Badge text="WIN" cls="green"/>:r==="LOSS"?<Badge text="LOSS" cls="red"/>:<Badge text="BE" cls="gray"/>}
function GradeBadge({g}){const m={"A+":"purple","A":"blue","B":"amber","C":"gray","F":"red"};return g?<Badge text={g} cls={m[g]||"gray"}/>:<Badge text="—" cls="gray"/>}
function DirBadge({d}){return <Badge text={d} cls={d==="Buy"?"green":"red"}/>}
function MkBadge({types}){
  if(!types||types.length===0)return<span style={{fontSize:11,color:"#22d3a0",opacity:.7}}>✓ Clean</span>;
  const cfg={"Psychology":{color:"#a78bfa"},"Risk":{color:"#f59e0b"},"Execution":{color:"#3b9eff"},"Market Read":{color:"#fb7121"}};
  return(
    <span style={{display:"flex",gap:4,flexWrap:"wrap"}}>
      {types.map(t=><span key={t} style={{fontSize:10,color:cfg[t]?.color||"#777",background:`${cfg[t]?.color||"#777"}18`,border:`1px solid ${cfg[t]?.color||"#777"}40`,padding:"1px 6px",borderRadius:3,fontWeight:600}}>{t}</span>)}
    </span>
  );
}

// ── TRADE FORM (shared by New + Edit) ────────────────────────────────────────
const EMPTY_TRADE_FORM = {
  date:"",account:"",symbol:"US100",direction:"Buy",session:"New York AM",
  grossPnl:"",fees:"0",netPnl:"",setupGrade:"A",result:"WIN",
  mistake:false,mistakeTypes:[],model:"Model #2",rr:"",bias:"Bullish",
  notes:"",riskPct:"1",screenshot:null,
  // Confluences
  htfBias:"",htfPoi:"",ltfEntry:"",entrySignal:"",
  confluences:[],customConfluence:"",
  entryTF:"1 minute",stopLossPips:"",takeProfitPips:"",
  partialsTaken:false,partialsNote:"",
  preTradeEmotion:"Calm",postTradeReflection:"",
};

const DEFAULT_CONFLUENCES=[
  "HTF Trend Alignment","HTF Imbalance","PO3 Alignment","Liquidity Sweep",
  "Displacement","SMT Divergence","Inversion FVG","MSS + Return to OB/FVG",
  "Candle Confirmation","External→Internal Liq","Internal→External Liq",
  "PDH/PDL","FVG","Order Block","Fair Value Gap","Break of Structure",
];
// Global confluence list stored in localStorage
function loadConfs(){try{const s=localStorage.getItem("mrt_confs");return s?JSON.parse(s):DEFAULT_CONFLUENCES;}catch{return DEFAULT_CONFLUENCES;}}
function saveConfs(arr){try{localStorage.setItem("mrt_confs",JSON.stringify(arr));}catch{}}
// Global profile
function loadProfile(){try{const s=localStorage.getItem("mrt_profile");return s?JSON.parse(s):null;}catch{return null;}}
function saveProfile(p){try{localStorage.setItem("mrt_profile",JSON.stringify(p));}catch{}}
// Global checklist
const DEFAULT_CHECKLIST=[
  "HTF bias confirmed before entry",
  "LTF structure aligned with HTF",
  "Entry signal clearly defined",
  "SL placed at invalidation level",
  "Position sized per risk rules",
  "Not trading during news events",
];
function loadChecklist(){try{const s=localStorage.getItem("mrt_checklist");return s?JSON.parse(s):DEFAULT_CHECKLIST;}catch{return DEFAULT_CHECKLIST;}}
function saveChecklist(arr){try{localStorage.setItem("mrt_checklist",JSON.stringify(arr));}catch{}}

function TradeForm({onSave,onClose,accounts,initial,confluenceOptions,checklist}){
  const base = initial ? {
    ...initial,
    grossPnl: String(initial.grossPnl??''),
    fees: String(initial.fees??'0'),
    netPnl: String(initial.netPnl??''),
    rr: String(initial.rr??''),
    riskPct: String(initial.riskPct??'1'),
    mistake: !!initial.mistake,
    confluences: initial.confluences||[],
    htfBias: initial.htfBias||'',
    htfPoi: initial.htfPoi||'',
    ltfEntry: initial.ltfEntry||'',
    entrySignal: initial.entrySignal||'',
    entryTF: initial.entryTF||'1 minute',
    stopLossPips: initial.stopLossPips||'',
    takeProfitPips: initial.takeProfitPips||'',
    customConfluence: '',
    partialsTaken: initial.partialsTaken||false,
    partialsNote: initial.partialsNote||'',
    preTradeEmotion: initial.preTradeEmotion||'Calm',
    postTradeReflection: initial.postTradeReflection||'',
  } : {...EMPTY_TRADE_FORM};

  const [f,setF]=useState(base);
  const [tab,setTab]=useState("trade"); // trade | entry | mistake

  const set=(k,v)=>setF(p=>{
    const n={...p,[k]:v};
    if(k==="grossPnl"||k==="fees"){
      const gp=parseFloat(n.grossPnl)||0,fe=parseFloat(n.fees)||0;
      n.netPnl=String(gp-fe);
      n.result=gp-fe>0?"WIN":gp-fe<0?"LOSS":"BE";
    }
    return n;
  });

  const toggleConf=(c)=>setF(p=>{
    const arr=p.confluences.includes(c)?p.confluences.filter(x=>x!==c):[...p.confluences,c];
    return{...p,confluences:arr};
  });
  const addCustomConf=()=>{
    const c=f.customConfluence.trim();
    if(c&&!f.confluences.includes(c))setF(p=>({...p,confluences:[...p.confluences,c],customConfluence:""}));
  };
  const toggleMkType=(type)=>setF(p=>{
    const arr=p.mistakeTypes.includes(type)?p.mistakeTypes.filter(t=>t!==type):[...p.mistakeTypes,type];
    return{...p,mistakeTypes:arr};
  });
  const handleScreenshot=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>setF(p=>({...p,screenshot:ev.target.result}));
    reader.readAsDataURL(file);
  };

  const valid=f.date&&f.account&&f.symbol&&f.grossPnl!=="";
  const save=()=>{
    const d=new Date(f.date);
    onSave({
      ...f,
      grossPnl:parseFloat(f.grossPnl)||0,fees:parseFloat(f.fees)||0,
      netPnl:parseFloat(f.netPnl)||0,rr:parseFloat(f.rr)||0,
      riskPct:parseFloat(f.riskPct)||1,mistake:f.mistake?1:0,
      year:d.getFullYear(),month:MONTHS[d.getMonth()],
    });
  };

  const tabs=[
    {id:"trade",label:"Trade Details"},
    {id:"entry",label:"Entry & Confluences"},
    {id:"mistake",label:"Discipline"},
  ];

  return(
    <div>
      {/* Tab bar */}
      <div style={{display:"flex",gap:2,marginBottom:20,background:"#0a0a0a",borderRadius:10,padding:4,border:"1px solid #1e1e1e"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1,padding:"8px 10px",border:"none",borderRadius:8,cursor:"pointer",
            fontFamily:"inherit",fontSize:12,fontWeight:600,transition:"all .15s",
            background:tab===t.id?"#1560ff":"transparent",
            color:tab===t.id?"#fff":"#555",
          }}>{t.label}</button>
        ))}
      </div>

      {/* ── TAB: TRADE DETAILS ── */}
      {tab==="trade"&&(
        <div className="form-grid">
          <div className="form-group"><label className="form-label">Date *</label><input type="date" className="form-input" value={f.date} onChange={e=>set("date",e.target.value)}/></div>
          <div className="form-group"><label className="form-label">Account *</label>
            <select className="form-select" value={f.account} onChange={e=>set("account",e.target.value)}>
              <option value="">Select account…</option>{accounts.map(a=><option key={a.id}>{a.name}</option>)}
            </select></div>
          <div className="form-group"><label className="form-label">Symbol *</label><input className="form-input" value={f.symbol} onChange={e=>set("symbol",e.target.value)}/></div>
          <div className="form-group"><label className="form-label">Direction</label>
            <select className="form-select" value={f.direction} onChange={e=>set("direction",e.target.value)}><option>Buy</option><option>Sell</option></select></div>
          <div className="form-group"><label className="form-label">Session</label>
            <select className="form-select" value={f.session} onChange={e=>set("session",e.target.value)}><option>New York AM</option><option>London Open</option><option>Asian Session</option></select></div>
          <div className="form-group"><label className="form-label">Setup Grade</label>
            <select className="form-select" value={f.setupGrade} onChange={e=>set("setupGrade",e.target.value)}><option>A+</option><option>A</option><option>B</option><option>C</option><option>F</option></select></div>
          <div className="form-group"><label className="form-label">Gross P&L ($) *</label><input type="number" className="form-input" value={f.grossPnl} onChange={e=>set("grossPnl",e.target.value)} placeholder="e.g. 500"/></div>
          <div className="form-group"><label className="form-label">Fees ($)</label><input type="number" className="form-input" value={f.fees} onChange={e=>set("fees",e.target.value)}/></div>
          <div className="form-group"><label className="form-label">Net P&L (auto)</label>
            <div style={{padding:"9px 12px",background:"#0a0a0a",borderRadius:10,border:"1px solid #1e1e1e",fontSize:13,fontFamily:"'DM Mono',monospace",color:parseFloat(f.netPnl)>0?"#22d3a0":parseFloat(f.netPnl)<0?"#f44060":"#555"}}>
              {f.grossPnl!==""?fmt$(parseFloat(f.netPnl)||0):"—"}</div></div>
          <div className="form-group"><label className="form-label">Result (auto)</label>
            <div style={{paddingTop:8}}>{f.grossPnl!==""?<ResultBadge r={f.result}/>:<span className="dim">—</span>}</div></div>
          <div className="form-group"><label className="form-label">Risk %</label><input type="number" className="form-input" value={f.riskPct} onChange={e=>set("riskPct",e.target.value)}/></div>
          <div className="form-group"><label className="form-label">R:R Achieved</label><input type="number" className="form-input" value={f.rr} onChange={e=>set("rr",e.target.value)}/></div>
          <div className="form-group"><label className="form-label">Bias</label>
            <select className="form-select" value={f.bias} onChange={e=>set("bias",e.target.value)}><option>Bullish</option><option>Bearish</option><option>Neutral</option></select></div>
          <div className="form-group"><label className="form-label">Model</label>
            <select className="form-select" value={f.model} onChange={e=>set("model",e.target.value)}><option>Model #1</option><option>Model #2</option></select></div>
          <div className="form-group full"><label className="form-label">Trade Notes</label>
            <textarea className="form-textarea" value={f.notes} onChange={e=>set("notes",e.target.value)} placeholder="Observations, trade management notes…"/></div>
          <div className="form-group full">
            <label className="form-label">Screenshot</label>
            <label className={`screenshot-drop${f.screenshot?" has-img":""}`} style={{cursor:"pointer"}}>
              <input type="file" accept="image/*" style={{display:"none"}} onChange={handleScreenshot}/>
              {f.screenshot?<img src={f.screenshot} alt="screenshot"/>:<>
                <div className="screenshot-drop-icon">📸</div>
                <div className="screenshot-drop-text">Click to upload chart screenshot</div>
                <div className="screenshot-drop-sub">PNG, JPG, WEBP supported</div>
              </>}
            </label>
            {f.screenshot&&<button type="button" onClick={()=>setF(p=>({...p,screenshot:null}))} style={{marginTop:6,fontSize:11,color:"#f44060",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>✕ Remove screenshot</button>}
          </div>
        </div>
      )}

      {/* ── TAB: ENTRY & CONFLUENCES ── */}
      {tab==="entry"&&(
        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          {/* HTF Context */}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:".1em",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #1e1e1e"}}>HTF Context</div>
            <div className="form-grid">
              <div className="form-group">
                <label className="form-label">HTF Bias</label>
                <select className="form-select" value={f.htfBias} onChange={e=>set("htfBias",e.target.value)}>
                  <option value="">Select…</option><option>Strong Bullish</option><option>Bullish</option><option>Neutral / Ranging</option><option>Bearish</option><option>Strong Bearish</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">HTF Point of Interest</label>
                <input className="form-input" value={f.htfPoi} onChange={e=>set("htfPoi",e.target.value)} placeholder="e.g. H4 FVG, Daily OB, PDH"/>
              </div>
            </div>
          </div>

          {/* LTF Entry */}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:".1em",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #1e1e1e"}}>LTF Entry</div>
            <div className="form-grid">
              <div className="form-group">
                <label className="form-label">Entry Timeframe</label>
                <select className="form-select" value={f.entryTF} onChange={e=>set("entryTF",e.target.value)}>
                  <option>1 minute</option><option>2 minutes</option><option>3 minutes</option><option>5 minutes</option><option>15 minutes</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Entry Signal</label>
                <input className="form-input" value={f.entrySignal} onChange={e=>set("entrySignal",e.target.value)} placeholder="e.g. Inversion FVG, MSS, BOS"/>
              </div>
              <div className="form-group">
                <label className="form-label">LTF Entry Description</label>
                <input className="form-input" value={f.ltfEntry} onChange={e=>set("ltfEntry",e.target.value)} placeholder="e.g. Swept PDL, displaced into OB"/>
              </div>
              <div className="form-group">
                <label className="form-label">Pre-Trade Emotion</label>
                <select className="form-select" value={f.preTradeEmotion} onChange={e=>set("preTradeEmotion",e.target.value)}>
                  <option>Calm</option><option>Confident</option><option>Anxious</option><option>Impatient</option><option>Revenge Seeking</option><option>Overconfident</option><option>Fearful</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">SL (pips)</label>
                <input type="number" className="form-input" value={f.stopLossPips} onChange={e=>set("stopLossPips",e.target.value)} placeholder="e.g. 20"/>
              </div>
              <div className="form-group">
                <label className="form-label">TP (pips)</label>
                <input type="number" className="form-input" value={f.takeProfitPips} onChange={e=>set("takeProfitPips",e.target.value)} placeholder="e.g. 60"/>
              </div>
            </div>
          </div>

          {/* Confluences checklist */}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:".1em",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #1e1e1e"}}>
              Confluences <span style={{color:"#1560ff",fontFamily:"'DM Mono',monospace"}}>{f.confluences.length} selected</span>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {(confluenceOptions||DEFAULT_CONFLUENCES).map(c=>{
                const active=f.confluences.includes(c);
                return(
                  <button key={c} type="button" onClick={()=>toggleConf(c)} style={{
                    padding:"6px 12px",borderRadius:20,fontSize:11,fontWeight:600,
                    cursor:"pointer",border:"1px solid",fontFamily:"inherit",transition:"all .15s",
                    background:active?"rgba(21,96,255,.2)":"#111",
                    color:active?"#fff":"#555",
                    borderColor:active?"#1560ff":"#2a2a2a",
                    boxShadow:active?"0 0 8px rgba(21,96,255,.2)":"none",
                  }}>{c}</button>
                );
              })}
            </div>
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <input className="form-input" style={{flex:1}} value={f.customConfluence} onChange={e=>set("customConfluence",e.target.value)} placeholder="Add custom confluence…" onKeyDown={e=>e.key==="Enter"&&addCustomConf()}/>
              <button type="button" className="btn btn-ghost btn-sm" onClick={addCustomConf}>Add</button>
            </div>
            {f.confluences.length>0&&(
              <div style={{marginTop:10,padding:"10px 12px",background:"#0a0a0a",border:"1px solid #1e1e1e",borderRadius:8,fontSize:11,color:"#888",lineHeight:1.7}}>
                <span style={{color:"#555",fontWeight:700}}>Tagged: </span>
                {f.confluences.map((c,i)=>(
                  <span key={c} style={{color:"#ccc",marginRight:4}}>
                    {c}
                    <button type="button" onClick={()=>toggleConf(c)} style={{marginLeft:3,color:"#f44060",background:"none",border:"none",cursor:"pointer",fontSize:10,padding:0}}>×</button>
                    {i<f.confluences.length-1&&<span style={{color:"#333"}}> · </span>}
                  </span>
                ))}
              </div>
            )}
          </div>

          {/* Partials */}
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <input type="checkbox" id="partials" checked={f.partialsTaken} onChange={e=>set("partialsTaken",e.target.checked)} style={{accentColor:"#22d3a0",width:14,height:14}}/>
              <label htmlFor="partials" style={{fontSize:13,color:"#888",cursor:"pointer"}}>Partials taken during trade</label>
            </div>
            {f.partialsTaken&&<textarea className="form-textarea" value={f.partialsNote} onChange={e=>set("partialsNote",e.target.value)} placeholder="Describe how you managed partials…"/>}
          </div>

          {/* Post-trade reflection */}
          <div className="form-group">
            <label className="form-label">Post-Trade Reflection</label>
            <textarea className="form-textarea" style={{minHeight:70}} value={f.postTradeReflection} onChange={e=>set("postTradeReflection",e.target.value)} placeholder="What went well? What would you do differently?"/>
          </div>
        </div>
      )}

      {/* ── TAB: DISCIPLINE ── */}
      {tab==="mistake"&&(
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div className={`mistake-toggle${f.mistake?" active":""}`} onClick={()=>setF(p=>({...p,mistake:!p.mistake,mistakeTypes:p.mistake?[]:p.mistakeTypes}))}>
            <div className="toggle-dot"/>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:f.mistake?"#f44060":"#777"}}>
                {f.mistake?"⚠ Mistake / Rule Break Flagged":"✓ Clean Trade — No Rule Breaks"}
              </div>
              <div style={{fontSize:11,color:"#444",marginTop:2}}>
                {f.mistake?"Select mistake type(s) below":"Click to flag this trade as a mistake"}
              </div>
            </div>
          </div>
          {f.mistake&&(
            <>
              <div>
                <label className="form-label" style={{marginBottom:10,display:"block"}}>Mistake Type(s)</label>
                <div className="mk-chips">
                  {MK_TYPES.map(({key,cls})=>(
                    <button key={key} type="button" className={`mk-chip ${cls}${f.mistakeTypes.includes(key)?" active":""}`} onClick={()=>toggleMkType(key)}>{key}</button>
                  ))}
                </div>
              </div>
              {f.mistakeTypes.length>0&&(
                <div style={{padding:"9px 12px",background:"#0a0a0a",borderRadius:8,border:"1px solid #1e1e1e",fontSize:12,color:"#888"}}>
                  <span style={{color:"#555"}}>Flagged: </span><span style={{color:"#fff",fontWeight:600}}>{f.mistakeTypes.join(" · ")}</span>
                </div>
              )}
            </>
          )}
          {/* Rule checklist */}
          <div style={{padding:"14px",background:"#0a0a0a",border:"1px solid #1e1e1e",borderRadius:10}}>
            <div style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:".1em",marginBottom:10}}>Pre-Trade Checklist</div>
            {(checklist||DEFAULT_CHECKLIST).map(rule=>(
              <div key={rule} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <input type="checkbox" style={{accentColor:"#22d3a0",width:13,height:13}}/>
                <span style={{fontSize:12,color:"#888"}}>{rule}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="form-actions" style={{marginTop:20}}>
        <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary" onClick={save} disabled={!valid}>{initial?"Update Trade":"Save Trade"}</button>
      </div>
    </div>
  );
}

// ── ACCOUNT FORM ──────────────────────────────────────────────────────────────

        <div className="form-group"><label className="form-label">Type</label>

// ── OVERVIEW ─────────────────────────────────────────────────────────────────
function Overview({trades,accounts}){
  const m=calcGlobal(trades);
  const recent=[...trades].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,7);
  const sessions={};trades.forEach(t=>{sessions[t.session]=(sessions[t.session]||0)+1});
  return(
    <div>
      <div className="kpi-grid">
        <div className="kpi-card"><div className="kpi-label">Net P&L</div><div className={`kpi-value ${pCol(m.netPnl)}`}>{fmt$(m.netPnl)}</div><div className="kpi-sub">{m.total} total trades</div></div>
        <div className="kpi-card"><div className="kpi-label">Win Rate</div><div className="kpi-value white">{pct(m.wr)}</div><div className="kpi-sub">{m.wins}W · {m.losses}L · {m.be}BE</div></div>
        <div className="kpi-card"><div className="kpi-label">Profit Factor</div><div className={`kpi-value ${m.pf>=1?"green":"red"}`}>{m.pf===Infinity?"∞":m.pf.toFixed(2)}</div><div className="kpi-sub">Gross wins / gross loss</div></div>

// ── TRADE DETAIL MODAL ───────────────────────────────────────────────────────
function TradeDetail({trade, onClose, onDelete, onEdit}){
  const [confirmDel, setConfirmDel] = useState(false);
  const fields = [
    ["Account", trade.account],
    ["Symbol", trade.symbol],
    ["Direction", trade.direction],
    ["Session", trade.session],
    ["Bias", trade.bias],
    ["Model", trade.model],
    ["Setup Grade", trade.setupGrade||"—"],
    ["Risk %", trade.riskPct+"%"],
    ["R:R", (trade.rr>0?"+":"")+((trade.rr||0).toFixed(2))+"R"],
    ["Gross P&L", fmt$(trade.grossPnl)],
    ["Fees", fmt$(trade.fees)],
    ["Net P&L", fmt$(trade.netPnl)],
  ];
  return(
    <div className="detail-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="detail-modal" style={{position:"relative"}}>
        {/* Screenshot hero */}
        <div className="detail-screenshot">
          {trade.screenshot
            ? <img src={trade.screenshot} alt="chart"/>
            : <div className="detail-screenshot-empty">
                <span style={{fontSize:36,opacity:.2}}>📸</span>
                <span style={{fontSize:12,color:"#333",fontWeight:500}}>No screenshot attached</span>
              </div>
          }
          <button onClick={onClose} style={{position:"absolute",top:12,right:12,background:"rgba(0,0,0,.7)",border:"1px solid #0c1c30",borderRadius:8,color:"#e8edf5",cursor:"pointer",width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,backdropFilter:"blur(4px)"}}>✕</button>
        </div>

        {/* Body */}
        <div className="detail-body">
          <div className="detail-header">
            <div>
              <div className="detail-title">{trade.symbol} · {trade.direction}</div>
              <div className="detail-sub">{trade.date} · {trade.session} · {trade.account}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div className={`detail-pnl ${pCol(trade.netPnl)}`}>{fmt$(trade.netPnl)}</div>
              <div style={{marginTop:6,display:"flex",gap:6,justifyContent:"flex-end"}}>
                <ResultBadge r={trade.result}/>
                <GradeBadge g={trade.setupGrade}/>
              </div>
            </div>
          </div>

          {/* Stats grid */}
          <div className="detail-grid">
            {fields.map(([l,v])=>(
              <div key={l} className="detail-field">
                <div className="detail-field-label">{l}</div>
                <div className="detail-field-val" style={{fontFamily:["Gross P&L","Fees","Net P&L","R:R"].includes(l)?"'DM Mono',monospace":"inherit",color:["Gross P&L","Net P&L"].includes(l)?trade.netPnl>0?"#22d3a0":"#f44060":"#e8edf5"}}>{v}</div>
              </div>
            ))}
          </div>

          {/* Mistakes */}
          {trade.mistake===1&&(
            <div style={{marginBottom:16,padding:"12px 14px",background:"rgba(244,64,96,.06)",border:"1px solid rgba(244,64,96,.2)",borderRadius:10}}>
              <div style={{fontSize:10,fontWeight:700,color:"#f44060",textTransform:"uppercase",letterSpacing:".08em",marginBottom:6}}>⚠ Mistake Flagged</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {(trade.mistakeTypes||[]).map(t=><MkBadge key={t} types={[t]}/>)}
                {(trade.mistakeTypes||[]).length===0&&<span style={{fontSize:12,color:"#888"}}>No type specified</span>}
              </div>
            </div>
          )}

          {/* Notes */}
          {trade.notes&&(
            <div className="detail-notes">
              <div style={{fontSize:10,fontWeight:700,color:"#444",textTransform:"uppercase",letterSpacing:".08em",marginBottom:6}}>Notes</div>
              <div style={{fontSize:13,color:"#c8d8f0",lineHeight:1.6}}>{trade.notes}</div>
            </div>
          )}

          {/* Actions */}
          <div className="detail-actions">
            <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Close</button>
            <button className="btn btn-ghost btn-sm" style={{padding:"9px 18px",borderRadius:9,fontSize:12,borderColor:"#1560ff",color:"#3b9eff"}} onClick={()=>{onEdit(trade);onClose();}}>✏ Edit</button>
            <button className={`btn btn-danger btn-sm`} style={{padding:"9px 18px",borderRadius:9,fontSize:12}} onClick={()=>setConfirmDel(true)}>🗑 Delete</button>
          </div>
        </div>

        {/* Confirm delete overlay */}
        {confirmDel&&(
          <div className="confirm-delete">
            <div style={{fontSize:28}}>⚠️</div>
            <p>Delete this trade?<br/><span style={{color:"#f44060",fontFamily:"'DM Mono',monospace"}}>{trade.symbol} {fmt$(trade.netPnl)}</span> on {trade.date}</p>
            <small>This cannot be undone</small>
            <div style={{display:"flex",gap:10,marginTop:4}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setConfirmDel(false)}>Cancel</button>
              <button className="btn btn-danger btn-sm" style={{padding:"8px 20px",borderRadius:8,fontSize:12}} onClick={()=>{onDelete(trade.id);onClose();}}>Yes, Delete</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── TRADE LOG ─────────────────────────────────────────────────────────────────
function TradeLog({trades,onNew,accounts,onDelete,onEdit}){
  const [fAcc,setFAcc]=useState("All");
  const [fRes,setFRes]=useState("All");
  const [fMk,setFMk]=useState("All");
  const [fMkType,setFMkType]=useState("All");
  const [view,setView]=useState("table"); // "table" | "library"
  const [selectedTrade,setSelectedTrade]=useState(null);

  const filtered=trades.filter(t=>
    (fAcc==="All"||t.account===fAcc)&&
    (fRes==="All"||t.result===fRes)&&
    (fMk==="All"||(fMk==="Yes"?t.mistake:!t.mistake))&&
    (fMkType==="All"||((t.mistakeTypes||[]).includes(fMkType)))
  );
  const sorted=[...filtered].sort((a,b)=>b.date.localeCompare(a.date));
  const totalPnl=filtered.reduce((s,t)=>s+t.netPnl,0);
  const sel="form-select";
  const ss={padding:"7px 12px",fontSize:12};

  return(
    <div>
      {/* Filters + view toggle */}
      <div className="filters">
        <div className="filter-left">
          <select className={sel} style={ss} value={fAcc} onChange={e=>setFAcc(e.target.value)}>
            <option>All</option>{accounts.map(a=><option key={a.id}>{a.name}</option>)}
          </select>
          <select className={sel} style={ss} value={fRes} onChange={e=>setFRes(e.target.value)}>
            <option>All</option><option>WIN</option><option>LOSS</option><option>BE</option>
          </select>
          <select className={sel} style={ss} value={fMk} onChange={e=>setFMk(e.target.value)}>
            <option>All</option><option value="Yes">Mistakes</option><option value="No">Clean</option>
          </select>
          <select className={sel} style={ss} value={fMkType} onChange={e=>setFMkType(e.target.value)}>
            <option value="All">All Types</option>{MK_TYPES.map(m=><option key={m.key}>{m.key}</option>)}
          </select>
        </div>
        <div style={{display:"flex",gap:8}}>
          {/* View toggle */}
          <div style={{display:"flex",background:"#0a0a0a",border:"1px solid #0c1c30",borderRadius:9,overflow:"hidden"}}>
            {[["table","≡ Table"],["library","⊞ Library"]].map(([v,l])=>(
              <button key={v} onClick={()=>setView(v)} style={{padding:"7px 14px",fontSize:12,fontWeight:600,border:"none",cursor:"pointer",fontFamily:"inherit",background:view===v?"#1560ff":"transparent",color:view===v?"#fff":"#444",transition:"all .15s"}}>
                {l}
              </button>
            ))}
          </div>
          <button className="btn btn-primary" onClick={onNew}>+ New Trade</button>
        </div>
      </div>

      {/* TABLE VIEW */}
      {view==="table"&&(
        <div className="card" style={{padding:0,overflow:"hidden"}}>
          <div className="table-wrap">
            <table>
              <thead><tr><th>#</th><th>Date</th><th>Account</th><th>Symbol</th><th>Dir</th><th>Session</th><th>Gross P&L</th><th>Net P&L</th><th>R:R</th><th>Grade</th><th>Result</th><th>Mistake</th><th>Type(s)</th><th>📸</th><th></th></tr></thead>
              <tbody>{sorted.map((t,i)=>(
                <tr key={t.id} onClick={()=>setSelectedTrade(t)} style={{cursor:"pointer"}}>
                  <td className="dim">{sorted.length-i}</td>
                  <td style={{color:"#888"}}>{t.date}</td>
                  <td style={{color:"#888",fontSize:11}}>{t.account}</td>
                  <td style={{color:"#e8edf5",fontWeight:700}}>{t.symbol}</td>
                  <td><DirBadge d={t.direction}/></td>
                  <td style={{color:"#888",fontSize:11}}>{t.session}</td>
                  <td className={pCol(t.grossPnl)} style={{fontFamily:"'DM Mono',monospace"}}>{fmt$(t.grossPnl)}</td>
                  <td className={pCol(t.netPnl)} style={{fontFamily:"'DM Mono',monospace",fontWeight:700}}>{fmt$(t.netPnl)}</td>
                  <td className={pCol(t.rr)} style={{fontFamily:"'DM Mono',monospace",fontSize:11}}>{t.rr>0?"+":""}{(t.rr||0).toFixed(2)}R</td>
                  <td><GradeBadge g={t.setupGrade}/></td>
                  <td><ResultBadge r={t.result}/></td>
                  <td>{t.mistake?<span style={{color:"#f44060",fontSize:11,fontWeight:700}}>⚠ Yes</span>:<span style={{color:"#22d3a0",fontSize:11,fontWeight:700}}>✓ No</span>}</td>
                  <td><MkBadge types={t.mistakeTypes}/></td>
                  <td>{t.screenshot?<span style={{fontSize:14}} title="Has screenshot">📸</span>:<span style={{color:"#333",fontSize:11}}>—</span>}</td>
                  <td style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span onClick={e=>{e.stopPropagation();onEdit(t)}} style={{cursor:"pointer",color:"#3b9eff",fontSize:13,opacity:.6}} title="Edit">✏</span>
                    <span onClick={e=>{e.stopPropagation();if(window.confirm("Delete this trade?"))onDelete(t.id)}} style={{cursor:"pointer",color:"#f44060",fontSize:13,opacity:.6}} title="Delete">🗑</span>
                  </td>
                </tr>
              ))}</tbody>
            </table>
          </div>
          <div className="table-foot">
            <span>Showing {sorted.length} of {trades.length} trades</span>
            <span className={pCol(totalPnl)} style={{fontFamily:"'DM Mono',monospace",fontWeight:700}}>{fmt$(totalPnl)}</span>
          </div>
        </div>
      )}

      {/* LIBRARY VIEW */}
      {view==="library"&&(
        <>
          {sorted.length===0&&<div style={{textAlign:"center",padding:"48px 20px",color:"#444"}}>No trades match your filters</div>}
          <div className="lib-grid">
            {sorted.map(t=>(
              <div key={t.id} className="trade-card" onClick={()=>setSelectedTrade(t)}>
                {/* Screenshot / placeholder */}
                <div className="trade-card-img">
                  {t.screenshot
                    ? <img src={t.screenshot} alt="chart"/>
                    : <>
                        <div className="trade-card-img-placeholder">📈</div>
                        <span style={{fontSize:11,color:"#333"}}>No screenshot</span>
                      </>
                  }
                </div>
                {/* Card body */}
                <div className="trade-card-body">
                  <div className="trade-card-top">
                    <div>
                      <div className="trade-card-name">{t.symbol} · {t.direction}</div>
                      <div className="trade-card-date">{t.date} · {t.session}</div>
                    </div>
                    <div className={`trade-card-pnl ${pCol(t.netPnl)}`}>{fmt$(t.netPnl)}</div>
                  </div>
                  <div className="trade-card-meta">
                    <ResultBadge r={t.result}/>
                    <GradeBadge g={t.setupGrade}/>
                    {t.mistake===1&&<span style={{fontSize:10,color:"#f44060",fontWeight:700}}>⚠ Mistake</span>}
                    <span style={{fontSize:10,color:"#444",marginLeft:"auto"}}>{t.account}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
          <div style={{marginTop:14,display:"flex",justifyContent:"space-between",fontSize:12,color:"#444",padding:"0 2px"}}>
            <span>{sorted.length} trades shown</span>
            <span className={pCol(totalPnl)} style={{fontFamily:"'DM Mono',monospace",fontWeight:700}}>{fmt$(totalPnl)}</span>
          </div>
        </>
      )}

      {/* Trade detail modal */}
      {selectedTrade&&(
        <TradeDetail
          trade={selectedTrade}
          onClose={()=>setSelectedTrade(null)}
          onDelete={(id)=>{onDelete(id);setSelectedTrade(null);}}
          onEdit={(t)=>{onEdit(t);setSelectedTrade(null);}}
        />
      )}
    </div>
  );
}

// ── MISTAKES PAGE ─────────────────────────────────────────────────────────────
function Mistakes({trades}){
  const mkTrades=trades.filter(t=>t.mistake);
  const cleanTrades=trades.filter(t=>!t.mistake);
  const mkPnl=mkTrades.reduce((s,t)=>s+t.netPnl,0);
  const cleanPnl=cleanTrades.reduce((s,t)=>s+t.netPnl,0);
  const mkCounts={Psychology:0,Risk:0,Execution:0,"Market Read":0};
  const mkPnls={Psychology:0,Risk:0,Execution:0,"Market Read":0};
  mkTrades.forEach(t=>{(t.mistakeTypes||[]).forEach(type=>{if(mkCounts[type]!==undefined){mkCounts[type]++;mkPnls[type]+=t.netPnl}})});
  const [selType,setSelType]=useState("All");
  const displayTrades=selType==="All"?mkTrades:mkTrades.filter(t=>(t.mistakeTypes||[]).includes(selType));
  const sorted=[...displayTrades].sort((a,b)=>b.date.localeCompare(a.date));
  return(
    <div>
      {/* KPI row */}
      <div className="mk-stat-grid">
        <div className="mk-stat"><div className="mk-stat-num" style={{color:"#f44060"}}>{mkTrades.length}</div><div className="mk-stat-lbl">Mistake Trades</div></div>
        <div className="mk-stat"><div className="mk-stat-num" style={{color:"#22d3a0"}}>{cleanTrades.length}</div><div className="mk-stat-lbl">Clean Trades</div></div>
        <div className="mk-stat"><div className="mk-stat-num" style={{color:mkPnl>=0?"#22d3a0":"#f44060"}}>{fmt$(mkPnl)}</div><div className="mk-stat-lbl">Mistake P&L Cost</div></div>
        <div className="mk-stat"><div className="mk-stat-num" style={{color:cleanPnl>=0?"#22d3a0":"#f44060"}}>{fmt$(cleanPnl)}</div><div className="mk-stat-lbl">Clean Trade P&L</div></div>
      </div>

      {/* Type breakdown */}
      <div className="grid4 section">
        {MK_TYPES.map(({key,icon,color,bg})=>{
          const cnt=mkCounts[key],pnl=mkPnls[key];
          const pf=trades.length>0?pct(cnt/trades.length):"0%";
          return(
            <div key={key} className="mk-type-card" style={{borderColor:selType===key?color:"#0d1f35",cursor:"pointer"}} onClick={()=>setSelType(selType===key?"All":key)}>
              <div className="mk-type-header">
                <div className="mk-type-icon" style={{background:bg,color}}>{icon}</div>
                <div><div className="mk-type-name">{key}</div><div className="mk-type-sub">{pf} of all trades</div></div>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
                <div><div style={{fontSize:32,fontWeight:900,fontFamily:"'DM Mono','Courier New',monospace",color,lineHeight:1}}>{cnt}</div><div style={{fontSize:10,color:"#444",fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",marginTop:2}}>occurrences</div></div>
                <div style={{textAlign:"right"}}><div className={pCol(pnl)} style={{fontFamily:"'DM Mono','Courier New',monospace",fontWeight:700,fontSize:14}}>{fmt$(pnl)}</div><div style={{fontSize:10,color:"#444"}}>P&L impact</div></div>
              </div>
              <div className="progress-track" style={{marginTop:10}}><div className="progress-bar" style={{width:`${trades.length>0?cnt/trades.length*100:0}%`,background:color}}/></div>
            </div>
          );
        })}
      </div>

      {/* Mistake trade list */}
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid #0d1f35",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span className="card-title" style={{margin:0}}>
            {selType==="All"?"All Mistake Trades":`${selType} Mistakes`}
            <span style={{color:"#444",fontWeight:400,fontSize:11,marginLeft:8,textTransform:"none",letterSpacing:0}}>({sorted.length} trades)</span>
          </span>
          {selType!=="All"&&<button className="btn btn-ghost btn-sm" onClick={()=>setSelType("All")}>Clear filter</button>}
        </div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Account</th><th>Symbol</th><th>Dir</th><th>Net P&L</th><th>Grade</th><th>Result</th><th>Mistake Types</th><th>Notes</th></tr></thead>
            <tbody>{sorted.map(t=>(
              <tr key={t.id}>
                <td style={{color:"#888"}}>{t.date}</td>
                <td style={{color:"#777",fontSize:11}}>{t.account}</td>
                <td style={{color:"#fff",fontWeight:700}}>{t.symbol}</td>
                <td><DirBadge d={t.direction}/></td>
                <td className={pCol(t.netPnl)} style={{fontFamily:"'DM Mono','Courier New',monospace",fontWeight:700}}>{fmt$(t.netPnl)}</td>
                <td><GradeBadge g={t.setupGrade}/></td>
                <td><ResultBadge r={t.result}/></td>
                <td><MkBadge types={t.mistakeTypes}/></td>
                <td style={{color:"#444",fontSize:11,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis"}}>{t.notes}</td>
              </tr>
            ))}</tbody>
          </table>
        </div>
        <div className="table-foot">
          <span>Mistake P&L: <span className={pCol(sorted.reduce((s,t)=>s+t.netPnl,0))} style={{fontFamily:"'DM Mono','Courier New',monospace",fontWeight:700}}>{fmt$(sorted.reduce((s,t)=>s+t.netPnl,0))}</span></span>
          <span>Clean would be: <span style={{color:"#22d3a0",fontFamily:"'DM Mono','Courier New',monospace",fontWeight:700}}>{fmt$(cleanPnl)}</span></span>
        </div>
      </div>
    </div>
  );
}

              </div>
              <div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#444",marginBottom:4}}><span>Drawdown</span><span>{Math.abs(m.ddPct).toFixed(1)}%</span></div>
                <div className="progress-track"><div className="progress-bar" style={{width:`${Math.min(Math.abs(m.ddPct/5)*100,100)}%`,background:m.netPnl>=0?"#22d3a0":"#f44060"}}/></div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── ANALYTICS ─────────────────────────────────────────────────────────────────
function Analytics({trades}){
  const [activeMonth,setActiveMonth]=useState(null);
  const [activeGrade,setActiveGrade]=useState(null);
  const [activeDir,setActiveDir]=useState(null);
  const [hoveredBar,setHoveredBar]=useState(null);

  const m=calcGlobal(trades);
  const byMonth={};
  trades.forEach(t=>{const k=`${t.month.slice(0,3)} ${t.year}`;if(!byMonth[k])byMonth[k]=[];byMonth[k].push(t)});
  const monthVals=Object.entries(byMonth).map(([k,ts])=>({k,pnl:ts.reduce((s,t)=>s+t.netPnl,0),trades:ts,wins:ts.filter(t=>t.result==="WIN").length}));
  const maxAbs=Math.max(...monthVals.map(v=>Math.abs(v.pnl)),1);

  const gradeStats={};
  trades.forEach(t=>{const g=t.setupGrade||"?";if(!gradeStats[g])gradeStats[g]={total:0,wins:0,pnl:0,trades:[]};gradeStats[g].total++;if(t.result==="WIN")gradeStats[g].wins++;gradeStats[g].pnl+=t.netPnl;gradeStats[g].trades.push(t)});

  const activeMTrades=activeMonth?byMonth[activeMonth]||[]:null;
  const activeGTrades=activeGrade?gradeStats[activeGrade]?.trades||[]:null;
  const activeDTrades=activeDir?trades.filter(t=>t.direction===activeDir):null;

  const sessionStats={};
  trades.forEach(t=>{if(!sessionStats[t.session])sessionStats[t.session]={total:0,wins:0,pnl:0};sessionStats[t.session].total++;if(t.result==="WIN")sessionStats[t.session].wins++;sessionStats[t.session].pnl+=t.netPnl});

  return(
    <div>
      {/* KPI strip */}
      <div className="kpi-grid" style={{marginBottom:20}}>
        <div className="kpi-card"><div className="kpi-label">Expectancy</div><div className={`kpi-value ${pCol(m.exp)}`}>{fmt$(Math.round(m.exp))}</div><div className="kpi-sub">Per trade avg</div></div>
        <div className="kpi-card"><div className="kpi-label">Avg Win</div><div className="kpi-value green">{fmt$(Math.round(m.avgW))}</div><div className="kpi-sub">{m.wins} winning trades</div></div>
        <div className="kpi-card"><div className="kpi-label">Avg Loss</div><div className="kpi-value red">{fmt$(Math.round(m.avgL))}</div><div className="kpi-sub">{m.losses} losing trades</div></div>
        <div className="kpi-card"><div className="kpi-label">Mistake Cost</div><div className="kpi-value amber">{fmt$(m.mkCost)}</div><div className="kpi-sub">{trades.filter(t=>t.mistake).length} mistake trades</div></div>
      </div>

      {/* Monthly P&L — clickable bars */}
      <div className="card section">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div className="card-title" style={{marginBottom:0}}>Monthly P&L</div>
          {activeMonth&&<button className="btn btn-ghost btn-sm" onClick={()=>setActiveMonth(null)}>✕ {activeMonth}</button>}
        </div>
        <div style={{display:"flex",alignItems:"flex-end",gap:8,height:120,marginBottom:16}}>
          {monthVals.map(({k,pnl,wins,trades:mt})=>{
            const isActive=activeMonth===k;
            const isHovered=hoveredBar===k;
            return(
              <div key={k} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6,height:"100%",cursor:"pointer"}}
                onClick={()=>setActiveMonth(activeMonth===k?null:k)}
                onMouseEnter={()=>setHoveredBar(k)} onMouseLeave={()=>setHoveredBar(null)}
              >
                <div style={{width:"100%",flex:1,display:"flex",flexDirection:"column",justifyContent:"flex-end",position:"relative"}}>
                  {(isHovered||isActive)&&(
                    <div style={{position:"absolute",bottom:"100%",left:"50%",transform:"translateX(-50%)",background:"#222",border:"1px solid #333",borderRadius:6,padding:"4px 8px",fontSize:11,fontFamily:"'DM Mono',monospace",color:pnl>=0?"#22d3a0":"#f44060",whiteSpace:"nowrap",marginBottom:4,zIndex:3}}>
                      {fmt$(pnl)}
                    </div>
                  )}
                  <div style={{
                    width:"100%",borderRadius:"4px 4px 0 0",
                    background:pnl>=0?"#22d3a0":"#f44060",
                    height:`${Math.abs(pnl)/maxAbs*100}%`,minHeight:4,
                    opacity:activeMonth&&!isActive?.3:isHovered?1:.7,
                    transition:"all .2s",
                    outline:isActive?"2px solid #fff":"none",outlineOffset:2,
                  }}/>
                </div>
                <span style={{fontSize:10,color:isActive?"#fff":"#444",fontWeight:isActive?700:400}}>{k.split(" ")[0]}</span>
              </div>
            );
          })}
        </div>
        {/* Clicked month breakdown */}
        {activeMTrades&&(
          <div style={{borderTop:"1px solid #1e1e1e",paddingTop:14}}>
            <div style={{fontSize:12,color:"#888",marginBottom:10}}>
              <span style={{color:"#fff",fontWeight:700}}>{activeMonth}</span> — {activeMTrades.length} trades · WR {pct(activeMTrades.filter(t=>t.result==="WIN").length/activeMTrades.length)} · P&L <span className={pCol(activeMTrades.reduce((s,t)=>s+t.netPnl,0))} style={{fontFamily:"'DM Mono',monospace",fontWeight:700}}>{fmt$(activeMTrades.reduce((s,t)=>s+t.netPnl,0))}</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {activeMTrades.sort((a,b)=>b.date.localeCompare(a.date)).map(t=>(
                <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#0a0a0a",border:"1px solid #1e1e1e",borderRadius:8,padding:"8px 12px",fontSize:12}}>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{color:"#888"}}>{t.date.slice(5)}</span>
                    <span style={{color:"#fff",fontWeight:600}}>{t.symbol}</span>
                    <DirBadge d={t.direction}/>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <GradeBadge g={t.setupGrade}/>
                    <ResultBadge r={t.result}/>
                    <span className={pCol(t.netPnl)} style={{fontFamily:"'DM Mono',monospace",fontWeight:700,minWidth:70,textAlign:"right"}}>{fmt$(t.netPnl)}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Grade + Direction side by side */}
      <div className="grid2 section">
        {/* Setup Grade — clickable */}
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
            <div className="card-title" style={{marginBottom:0}}>Performance by Grade</div>
            {activeGrade&&<button className="btn btn-ghost btn-sm" onClick={()=>setActiveGrade(null)}>✕ {activeGrade}</button>}
          </div>
          {["A+","A","B","C","F"].filter(g=>gradeStats[g]).map(g=>{
            const s=gradeStats[g];
            const isActive=activeGrade===g;
            const wr=s.wins/s.total;
            return(
              <div key={g} onClick={()=>setActiveGrade(activeGrade===g?null:g)}
                style={{cursor:"pointer",padding:"10px 12px",borderRadius:10,marginBottom:6,border:"1px solid",transition:"all .18s",
                  background:isActive?"#1a1a1a":"transparent",
                  borderColor:isActive?"#444":"transparent",
                }}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <GradeBadge g={g}/>
                    <span style={{fontSize:12,color:"#888"}}>{s.total} trades</span>
                  </div>
                  <div style={{display:"flex",gap:12,alignItems:"center"}}>
                    <span style={{fontSize:12,color:"#888"}}>WR <span style={{color:"#ccc",fontWeight:600}}>{pct(wr)}</span></span>
                    <span className={pCol(s.pnl)} style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:13}}>{fmt$(s.pnl)}</span>
                  </div>
                </div>
                <div style={{height:3,background:"#1e1e1e",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:2,width:`${wr*100}%`,background:s.pnl>=0?"#22d3a0":"#f44060",transition:"width .4s"}}/>
                </div>
              </div>
            );
          })}
          {activeGTrades&&(
            <div style={{borderTop:"1px solid #1e1e1e",marginTop:8,paddingTop:12,display:"flex",flexDirection:"column",gap:5}}>
              {activeGTrades.sort((a,b)=>b.date.localeCompare(a.date)).map(t=>(
                <div key={t.id} style={{display:"flex",justifyContent:"space-between",background:"#0a0a0a",border:"1px solid #1e1e1e",borderRadius:8,padding:"7px 11px",fontSize:12}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{color:"#888"}}>{t.date.slice(5)}</span>
                    <DirBadge d={t.direction}/>
                    <ResultBadge r={t.result}/>
                  </div>
                  <span className={pCol(t.netPnl)} style={{fontFamily:"'DM Mono',monospace",fontWeight:700}}>{fmt$(t.netPnl)}</span>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Session stats */}
        <div className="card">
          <div className="card-title">Session Performance</div>
          {Object.entries(sessionStats).map(([s,d])=>{
            const wr=d.wins/d.total;
            return(
              <div key={s} style={{marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:13,color:"#ccc",fontWeight:600}}>{s}</span>
                  <div style={{display:"flex",gap:12}}>
                    <span style={{fontSize:11,color:"#888"}}>{d.total} trades · WR <span style={{color:"#ccc"}}>{pct(wr)}</span></span>
                    <span className={pCol(d.pnl)} style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:13}}>{fmt$(d.pnl)}</span>
                  </div>
                </div>
                <div style={{height:6,background:"#1e1e1e",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:3,width:`${wr*100}%`,background:d.pnl>=0?"#22d3a0":"#f44060",transition:"width .4s"}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Direction + clean/mistake + model row */}
      <div className="grid3">
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
            <div className="card-title" style={{marginBottom:0}}>Direction</div>
            {activeDir&&<button className="btn btn-ghost btn-sm" onClick={()=>setActiveDir(null)}>✕</button>}
          </div>
          {["Buy","Sell"].map(dir=>{
            const dt=trades.filter(t=>t.direction===dir);
            const dpnl=dt.reduce((s,t)=>s+t.netPnl,0);
            const isActive=activeDir===dir;
            return(
              <div key={dir} onClick={()=>setActiveDir(activeDir===dir?null:dir)}
                style={{cursor:"pointer",padding:"10px 12px",borderRadius:10,marginBottom:8,border:"1px solid",transition:"all .18s",
                  background:isActive?"#1a1a1a":"transparent",borderColor:isActive?"#444":"transparent"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}><DirBadge d={dir}/><span style={{fontSize:12,color:"#888"}}>{dt.length} trades</span></div>
                  <span className={pCol(dpnl)} style={{fontFamily:"'DM Mono',monospace",fontWeight:700}}>{fmt$(dpnl)}</span>

                <div style={{height:3,background:"#1e1e1e",borderRadius:2}}>
                  <div style={{height:"100%",borderRadius:2,width:`${dt.length/trades.length*100}%`,background:dir==="Buy"?"#22d3a0":"#3b9eff",transition:"width .4s"}}/>

            <div style={{borderTop:"1px solid #1e1e1e",paddingTop:10,marginTop:4,display:"flex",flexDirection:"column",gap:5,maxHeight:180,overflowY:"auto"}}>
              {activeDTrades.sort((a,b)=>b.date.localeCompare(a.date)).map(t=>(
                <div key={t.id} style={{display:"flex",justifyContent:"space-between",background:"#0a0a0a",border:"1px solid #1e1e1e",borderRadius:8,padding:"6px 10px",fontSize:12}}>
                  <div style={{display:"flex",gap:6}}><span style={{color:"#888"}}>{t.date.slice(5)}</span><ResultBadge r={t.result}/></div>
                  <span className={pCol(t.netPnl)} style={{fontFamily:"'DM Mono',monospace",fontWeight:700}}>{fmt$(t.netPnl)}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="card">
          <div className="card-title">Clean vs Mistake</div>
          {[["Clean Trades",m.cleanPnl,"#22d3a0"],["Mistake Trades",m.mkCost,"#f44060"],["Net Total",m.netPnl,"#fff"]].map(([l,v,c],i)=>{
            const total=Math.abs(m.cleanPnl)+Math.abs(m.mkCost)||1;
            return(
              <div key={l} style={{marginBottom:i<2?14:0,paddingTop:i===2?12:0,borderTop:i===2?"1px solid #1e1e1e":"none"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:i<2?6:0}}>
                  <span style={{fontSize:13,color:i===2?"#ccc":"#888"}}>{l}</span>
                  <span style={{fontFamily:"'DM Mono',monospace",fontWeight:700,color:v>0?"#22d3a0":v<0?"#f44060":"#888"}}>{fmt$(v)}</span>
                </div>
                {i<2&&<div style={{height:4,background:"#1e1e1e",borderRadius:2}}>
                  <div style={{height:"100%",borderRadius:2,width:`${Math.abs(v)/total*100}%`,background:c,opacity:.7,transition:"width .4s"}}/>
                </div>}
              </div>
            );
          })}
        </div>
        <div className="card">
          <div className="card-title">Model Split</div>
          {["Model #1","Model #2"].map(mod=>{
            const mt=trades.filter(t=>t.model===mod);
            const mpnl=mt.reduce((s,t)=>s+t.netPnl,0);
            const mwr=mt.length>0?mt.filter(t=>t.result==="WIN").length/mt.length:0;
            return(
              <div key={mod} style={{marginBottom:16,padding:"10px 12px",background:"#0a0a0a",border:"1px solid #1e1e1e",borderRadius:10}}>

                  <span className={pCol(mpnl)} style={{fontFamily:"'DM Mono',monospace",fontWeight:700}}>{fmt$(mpnl)}</span>
