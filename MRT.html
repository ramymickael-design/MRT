        // Show feedback popup once per user, 90 seconds after first login
        try {
          if(!localStorage.getItem(FEEDBACK_KEY)){
            setTimeout(()=>setShowFeedback(true), 90000);
          }

      } else {
        setLoading(false);
      }
    });
    const {data:{subscription}}=_supabase.auth.onAuthStateChange((_event,session)=>{
      if(!session) { setCurrentUser(null); setTrades([]); setAccounts([]); setLoading(false); }
    });
    return ()=>subscription.unsubscribe();
  },[]);

  // ── Load all user data from Supabase ─────────────────────────
  const loadUserData=async(userId)=>{
    setLoading(true);
    try{
      const [tradesRes, accsRes] = await Promise.all([
        _supabase.from('trades').select('*').eq('user_id',userId).order('trade_date',{ascending:false}),
        _supabase.from('accounts').select('*').eq('user_id',userId).order('created_at',{ascending:true}),
      ]);
      if(tradesRes.data) setTrades(tradesRes.data.map(dbToTrade));
      if(accsRes.data)   setAccounts(accsRes.data.map(dbToAccount));
    }catch(e){ console.error('Load error:',e); }
    setLoading(false);
  };

  // ── Auth handlers ─────────────────────────────────────────────
  const handleAuthSuccess=(user)=>{
    setCurrentUser(user);
    loadUserData(user.id);
    if(!loadProfile()) setShowOnboarding(true);
    try {
      if(!localStorage.getItem(FEEDBACK_KEY)){
        setTimeout(()=>setShowFeedback(true), 120000); // 2 min for new users
      }
    } catch(e) {}
  };
  const handleSignOut=async()=>{
    await _supabase.auth.signOut();
    setCurrentUser(null);
    setTrades([]);
    setAccounts([]);
  };

  // ── Trade CRUD ────────────────────────────────────────────────
  const addTrade=useCallback(async(t)=>{
    if(!currentUser) return;
    const row=tradeToDb(t,currentUser.id);
    const {data,error}=await _supabase.from('trades').insert(row).select().single();
    if(!error&&data){ setTrades(p=>[dbToTrade(data),...p]); }
    setShowTrade(false);
  },[currentUser]);

  const saveTrade=useCallback(async(t)=>{
    if(!currentUser) return;
    if(editingTrade){
      const row=tradeToDb(t,currentUser.id);
      const {data,error}=await _supabase.from('trades').update(row).eq('id',t.id).eq('user_id',currentUser.id).select().single();
      if(!error&&data){ setTrades(p=>p.map(x=>x.id===t.id?dbToTrade(data):x)); }
      setEditingTrade(null);
    } else {
      await addTrade(t);
    }
  },[currentUser,editingTrade,addTrade]);

  const deleteTrade=useCallback(async(id)=>{
    if(!currentUser) return;
    await _supabase.from('trades').delete().eq('id',id).eq('user_id',currentUser.id);
    setTrades(p=>p.filter(t=>t.id!==id));
  },[currentUser]);

  // ── Account CRUD ──────────────────────────────────────────────
  const addAcc=useCallback(async(a)=>{
    if(!currentUser) return;
    const row=accountToDb(a,currentUser.id);
    const {data,error}=await _supabase.from('accounts').insert(row).select().single();
    if(!error&&data){ setAccounts(p=>[...p,dbToAccount(data)]); }
    setShowAcc(false);
  },[currentUser]);

  // ── Profile / settings ────────────────────────────────────────
  const saveProfileAndClose=(p)=>{saveProfile(p);setProfile(p);setShowOnboarding(false);};
  const updateConfs=(arr)=>{saveConfs(arr);setConfluenceOptions(arr);};
  const updateChecklist=(arr)=>{saveChecklist(arr);setChecklist(arr);};

  const m=calcGlobal(trades);
  const mkCount=trades.filter(t=>t.mistake).length;

  // ── Not logged in → show auth ─────────────────────────────────
  if(!currentUser && !loading){
    return <AuthScreen onSuccess={handleAuthSuccess}/>;
  }

  // ── Loading ───────────────────────────────────────────────────
  if(loading){
    return(
      <div style={{minHeight:"100vh",background:"#080808",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
        <div style={{width:36,height:36,borderRadius:"50%",border:"3px solid #1e1e1e",borderTop:"3px solid #1560ff",animation:"spin .8s linear infinite"}}/>
        <div style={{color:"#444",fontSize:13}}>Loading your journal…</div>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      </div>
    );
  }

  return(
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-icon">M</div>
          <div>
            <div className="logo-text">MRT</div>
            <div className="logo-sub" style={{color:"#555",fontSize:10,marginTop:1}}>{currentUser?.name||'Trader'}</div>
          </div>
        </div>
        <nav className="nav">
          {NAV.map(n=>(
            <button key={n.id} className={`nav-item${page===n.id?" active":""}`} onClick={()=>setPage(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              {n.label}
              {n.id==="mistakes"&&mkCount>0&&<span style={{marginLeft:"auto",background:"#f44060",color:"#fff",fontSize:9,fontWeight:900,padding:"1px 5px",borderRadius:10}}>{mkCount}</span>}
            </button>
          ))}
        </nav>
        <div className="sidebar-stats">
          <div style={{fontSize:10,color:"#333",textTransform:"uppercase",letterSpacing:".12em",fontWeight:700,marginBottom:10}}>Portfolio</div>
          <div className="stat-row"><span className="stat-label">Net P&L</span><span className={pCol(m.netPnl)} style={{fontFamily:"'DM Mono','Courier New',monospace",fontWeight:700}}>{fmt$(m.netPnl)}</span></div>
          <div className="stat-row"><span className="stat-label">Win Rate</span><span style={{color:"#fff",fontFamily:"'DM Mono','Courier New',monospace"}}>{pct(m.wr)}</span></div>
          <div className="stat-row"><span className="stat-label">Discipline</span><span style={{color:m.dr>=0.6?"#22d3a0":"#f59e0b",fontFamily:"'DM Mono','Courier New',monospace"}}>{pct(m.dr)}</span></div>
          <div className="stat-row"><span className="stat-label">Trades</span><span style={{color:"#fff",fontFamily:"'DM Mono','Courier New',monospace"}}>{m.total}</span></div>
        </div>
      </aside>

      <div className="main">
        <div className="topbar">
          <span className="page-title">{NAV.find(n=>n.id===page)?.label}</span>
          <div className="topbar-right">
            <span className="topbar-stat">PF: <span className={m.pf>=1?"green":"red"}>{m.pf===Infinity?"∞":m.pf.toFixed(2)}</span></span>
            <span className={pCol(m.netPnl)} style={{fontFamily:"'DM Mono','Courier New',monospace",fontWeight:700,fontSize:13}}>{fmt$(m.netPnl)}</span>
            <button className="btn btn-primary" style={{padding:"8px 16px",fontSize:12}} onClick={()=>setShowTrade(true)}>+ New Trade</button>
            <button onClick={handleSignOut} style={{padding:"7px 13px",background:"none",border:"1px solid #222",borderRadius:8,color:"#555",fontSize:12,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}} onMouseOver={e=>{e.target.style.borderColor="#f44060";e.target.style.color="#f44060";}} onMouseOut={e=>{e.target.style.borderColor="#222";e.target.style.color="#555";}}>Sign out</button>
          </div>
        </div>
        <div className="content">
          {page==="education" && <Education profile={profile}/>}
          {page==="overview"  && <Overview  trades={trades} accounts={accounts}/>}
          {page==="trades"    && <TradeLog  trades={trades} onNew={()=>setShowTrade(true)} accounts={accounts} onDelete={deleteTrade} onEdit={t=>{setEditingTrade(t);}}/>}
          {page==="accounts"  && <Accounts  accounts={accounts} trades={trades} onNew={()=>setShowAcc(true)}/>}
          {page==="mistakes"  && <Mistakes  trades={trades}/>}
          {page==="analytics" && <Analytics trades={trades}/>}
          {page==="reviews"   && <Reviews   trades={trades}/>}
          {page==="calendar"  && <Calendar  trades={trades}/>}
          {page==="strategy"  && <StrategyBuilder trades={trades} confluenceOptions={confluenceOptions} updateConfs={updateConfs} checklist={checklist} updateChecklist={updateChecklist} profile={profile}/>}
          {page==="settings"  && <Settings confluenceOptions={confluenceOptions} updateConfs={updateConfs} checklist={checklist} updateChecklist={updateChecklist} profile={profile} onResetProfile={()=>setShowOnboarding(true)}/>}
        </div>
      </div>

      <AICoach trades={trades} accounts={accounts}/>
      {/* Mobile bottom nav */}
      <div className="mobile-nav" id="mobile-nav">
        {[
          {id:"overview",icon:"◈",label:"Home"},
          {id:"trades",icon:"≡",label:"Trades"},
          {id:"analytics",icon:"∿",label:"Stats"},
          {id:"strategy",icon:"◎",label:"Strategy"},
          {id:"settings",icon:"⚙",label:"Settings"},
        ].map(n=>(
          <button key={n.id} className={`mobile-nav-item${page===n.id?" active":""}`} onClick={()=>setPage(n.id)}>
            <span>{n.icon}</span>
            <span>{n.label}</span>
          </button>
        ))}
      </div>
      {showOnboarding && <Onboarding onComplete={saveProfileAndClose}/>}
      {showFeedback && <FeedbackPopup onClose={()=>setShowFeedback(false)} userId={currentUser?.id}/>}
      {showTrade && <Modal title="Log New Trade" onClose={()=>setShowTrade(false)}><TradeForm onSave={saveTrade} onClose={()=>setShowTrade(false)} accounts={accounts} confluenceOptions={confluenceOptions} checklist={checklist}/></Modal>}
      {editingTrade && <Modal title="Edit Trade" onClose={()=>setEditingTrade(null)}><TradeForm onSave={saveTrade} onClose={()=>setEditingTrade(null)} accounts={accounts} initial={editingTrade} confluenceOptions={confluenceOptions} checklist={checklist}/></Modal>}
      {showAcc && <Modal title="Create Account" onClose={()=>setShowAcc(false)}><AccountForm onSave={addAcc} onClose={()=>setShowAcc(false)}/></Modal>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
