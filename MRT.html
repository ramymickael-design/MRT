    account: r.account_name||'',
    symbol: r.symbol, direction: r.direction, session: r.session||'',
    month: r.month || MNAMES[mo-1] || '', year: r.year || yr,
    grossPnl: parseFloat(r.gross_pnl)||0, fees: parseFloat(r.fees)||0,
    netPnl: parseFloat(r.net_pnl)||0, setupGrade: r.setup_grade||'',

    postTradeReflection: r.post_trade_reflection||'',
    mistake: r.is_mistake?1:0, mistakeTypes: r.mistake_types||[],
    mistakeType: (r.mistake_types||[]).join(' + '),
  };
}
function tradeToDb(t, userId){
  const d = new Date(t.date.replace(/\//g,'-'));
  const gp = parseFloat(t.grossPnl)||0;
  const fe = parseFloat(t.fees)||0;
  return {
    user_id: userId,
    account_name: t.account, symbol: t.symbol, direction: t.direction,
    session: t.session,
    trade_date: t.date.replace(/\//g,'-'),
    month: t.month, year: t.year||d.getFullYear(),
    gross_pnl: gp, fees: fe,
    net_pnl: gp - fe,
    setup_grade: t.setupGrade, result: t.result,
    risk_pct: parseFloat(t.riskPct)||1, rr_achieved: parseFloat(t.rr)||0, bias: t.bias, model: t.model,

    post_trade_reflection: t.postTradeReflection||null,
    is_mistake: t.mistake===1||t.mistake===true,
    mistake_types: t.mistakeTypes||[],
  };
}
function dbToAccount(r){

    startingBalance: parseFloat(r.starting_balance)||0, status: r.status||'Active',

  };
}
function accountToDb(a, userId){

}
