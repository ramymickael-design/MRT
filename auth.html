<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MRT — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#080808;color:#e8edf5;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:15px;line-height:1.6;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  display:flex;flex-direction:column;
}
/* ── BG GLOW ── */
.bg-glow{
  position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(21,96,255,.1) 0%,transparent 60%);
}
/* ── NAV ── */
nav{
  position:relative;z-index:10;
  padding:0 5%;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid #1a1a1a;
}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,#1560ff,#0a3db5);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:13px;color:#fff;
  box-shadow:0 0 14px rgba(21,96,255,.4);
}
.logo-text{font-size:16px;font-weight:900;color:#fff;letter-spacing:2px;text-transform:uppercase}
.nav-right{font-size:13px;color:#555}
.nav-right a{color:#3b9eff;text-decoration:none;font-weight:600}
.nav-right a:hover{color:#fff}

/* ── LAYOUT ── */
.page{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:40px 20px;position:relative;z-index:1;
}
.card{
  width:100%;max-width:420px;
  background:#0f0f0f;border:1px solid #1e1e1e;
  border-radius:20px;padding:36px 32px;
  box-shadow:0 32px 80px rgba(0,0,0,.6);
}

/* ── TABS ── */
.tabs{
  display:flex;background:#080808;border:1px solid #1e1e1e;
  border-radius:12px;padding:4px;margin-bottom:28px;
}
.tab{
  flex:1;padding:9px;border:none;border-radius:9px;
  font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
  transition:all .18s;background:transparent;color:#555;
}
.tab.active{background:#1a1a1a;color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.4)}

/* ── HEADING ── */
.card-title{font-size:22px;font-weight:900;color:#fff;margin-bottom:6px;letter-spacing:-.01em}
.card-sub{font-size:13px;color:#666;margin-bottom:24px}

/* ── FORM ── */
.form-group{margin-bottom:14px}
.form-label{
  display:block;font-size:11px;font-weight:700;
  color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;
}
.form-input{
  width:100%;background:#080808;border:1px solid #222;
  border-radius:10px;padding:11px 14px;font-size:14px;
  color:#e8edf5;font-family:inherit;outline:none;transition:all .18s;
}
.form-input:focus{border-color:#1560ff;box-shadow:0 0 0 3px rgba(21,96,255,.1)}
.form-input::placeholder{color:#333}
.form-input.error{border-color:#f44060}

/* ── PASSWORD STRENGTH ── */
.strength-bar{height:3px;border-radius:2px;background:#1a1a1a;margin-top:6px;overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s}
.strength-label{font-size:11px;color:#555;margin-top:4px}

/* ── DIVIDER ── */
.divider{
  display:flex;align-items:center;gap:10px;
  font-size:11px;color:#333;margin:18px 0;
}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:#1a1a1a}

/* ── SUBMIT ── */
.btn-submit{
  width:100%;padding:13px;border:none;border-radius:11px;
  background:linear-gradient(135deg,#1560ff,#0a3db5);
  color:#fff;font-size:15px;font-weight:700;font-family:inherit;
  cursor:pointer;transition:all .2s;margin-top:6px;
  box-shadow:0 4px 20px rgba(21,96,255,.35);
}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(21,96,255,.55)}
.btn-submit:active{transform:translateY(0)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── SOCIAL ── */
.btn-social{
  width:100%;padding:11px;border:1px solid #222;border-radius:11px;
  background:transparent;color:#aaa;font-size:13px;font-weight:600;
  font-family:inherit;cursor:pointer;transition:all .18s;
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:10px;
}
.btn-social:hover{border-color:#555;color:#fff;background:#0f0f0f}
.btn-social svg{width:18px;height:18px;flex-shrink:0}

/* ── ERROR / SUCCESS ── */
.alert{
  padding:11px 14px;border-radius:9px;font-size:13px;
  margin-bottom:14px;display:none;
}
.alert.error{background:rgba(244,64,96,.1);border:1px solid rgba(244,64,96,.2);color:#f44060}
.alert.success{background:rgba(34,211,160,.1);border:1px solid rgba(34,211,160,.2);color:#22d3a0}
.alert.show{display:block}

/* ── FOOTER ── */
.card-footer{
  text-align:center;font-size:12px;color:#444;
  margin-top:20px;padding-top:20px;border-top:1px solid #1a1a1a;
}
.card-footer a{color:#3b9eff;text-decoration:none}
.card-footer a:hover{color:#fff}

/* ── LOADING SPINNER ── */
.spinner{
  width:16px;height:16px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;display:inline-block;
  vertical-align:middle;margin-right:8px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FORGOT ── */
.forgot-link{
  float:right;font-size:11px;color:#555;
  text-decoration:none;transition:color .15s;
}
.forgot-link:hover{color:#3b9eff}

/* ── TERMS NOTE ── */
.terms-note{font-size:11px;color:#444;text-align:center;margin-top:12px;line-height:1.6}
.terms-note a{color:#555;text-decoration:underline}
.terms-note a:hover{color:#888}
</style>
</head>
<body>
<div class="bg-glow"></div>

<nav>
  <a href="landing.html" class="nav-logo">
    <div class="logo-icon">M</div>
    <div class="logo-text">MRT</div>
  </a>
  <div class="nav-right" id="nav-hint">
    Already have an account? <a href="#" onclick="setMode('login');return false">Sign in</a>
  </div>
</nav>

<div class="page">
  <div class="card">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-signup" onclick="setMode('signup')">Create Account</button>
      <button class="tab" id="tab-login" onclick="setMode('login')">Sign In</button>
    </div>

    <!-- SIGN UP FORM -->
    <div id="form-signup">
      <div class="card-title">Start for free</div>
      <div class="card-sub">Full access. No credit card required.</div>

      <div class="alert error" id="signup-error"></div>
      <div class="alert success" id="signup-success"></div>

      <div class="form-group">
        <label class="form-label">Your Name</label>
        <input class="form-input" type="text" id="signup-name" placeholder="e.g. Alex" autocomplete="name"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="signup-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="signup-password" placeholder="Minimum 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)"/>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill" style="width:0%"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>
      <button class="btn-submit" id="signup-btn" onclick="handleSignup()">Create Account</button>
      <div class="terms-note">By signing up you agree to our <a href="terms.html" target="_blank">Terms of Service</a> and <a href="privacy.html" target="_blank">Privacy Policy</a>.</div>
    </div>

    <!-- LOG IN FORM -->
    <div id="form-login" style="display:none">
      <div class="card-title">Welcome back</div>
      <div class="card-sub">Sign in to your MRT journal</div>

      <div class="alert error" id="login-error"></div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">
          Password
          <a href="#" class="forgot-link" onclick="showForgot();return false">Forgot password?</a>
        </label>
        <input class="form-input" type="password" id="login-password" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleLogin()"/>
      </div>
      <button class="btn-submit" id="login-btn" onclick="handleLogin()">Sign In</button>
    </div>

    <!-- FORGOT PASSWORD -->
    <div id="form-forgot" style="display:none">
      <div class="card-title">Reset password</div>
      <div class="card-sub">We'll send a reset link to your email</div>
      <div class="alert success" id="forgot-success"></div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="forgot-email" placeholder="you@example.com"/>
      </div>
      <button class="btn-submit" onclick="handleForgot()">Send Reset Link</button>
      <div style="text-align:center;margin-top:14px">
        <a href="#" onclick="setMode('login');return false" style="font-size:13px;color:#555;text-decoration:none">← Back to sign in</a>
      </div>
    </div>

    <div class="card-footer">
      <a href="landing.html">← Back to home</a>
    </div>
  </div>
</div>

<script>
// ── SESSION HELPERS ──────────────────────────────────────────────
function saveSession(user){
  try{ localStorage.setItem('mrt_user', JSON.stringify(user)); }catch(e){}
}
function getSession(){
  try{ var s=localStorage.getItem('mrt_user'); return s?JSON.parse(s):null; }catch(e){return null;}
}
function clearSession(){
  try{ localStorage.removeItem('mrt_user'); }catch(e){}
}

// ── SIMPLE LOCAL AUTH (replace with Supabase later) ───────────────
// Users stored as: { email, name, passwordHash, createdAt }
function getUsers(){
  try{ var u=localStorage.getItem('mrt_users'); return u?JSON.parse(u):[]; }catch(e){return [];}
}
function saveUsers(arr){
  try{ localStorage.setItem('mrt_users', JSON.stringify(arr)); }catch(e){}
}
function hashPassword(pw){
  // Simple deterministic hash for demo — replace with bcrypt via Supabase in production
  var h=0;
  for(var i=0;i<pw.length;i++){ h=((h<<5)-h)+pw.charCodeAt(i); h|=0; }
  return 'h_'+Math.abs(h).toString(36)+'_'+pw.length;
}

// ── AUTO-REDIRECT IF ALREADY LOGGED IN ───────────────────────────
(function(){
  var s = getSession();
  if(s && s.email){
    window.location.href = 'MRT.html';
  }
  // Check if coming from landing page with ?mode=signup or ?mode=login
  var params = new URLSearchParams(window.location.search);
  var mode = params.get('mode');
  if(mode === 'login') setMode('login');
})();

// ── MODE SWITCHING ────────────────────────────────────────────────
function setMode(mode){
  var isSU = mode === 'signup';
  var isFG = mode === 'forgot';
  document.getElementById('form-signup').style.display  = isSU ? 'block' : 'none';
  document.getElementById('form-login').style.display   = (!isSU && !isFG) ? 'block' : 'none';
  document.getElementById('form-forgot').style.display  = isFG ? 'block' : 'none';
  document.getElementById('tab-signup').classList.toggle('active', isSU);
  document.getElementById('tab-login').classList.toggle('active', !isSU && !isFG);
  document.getElementById('nav-hint').innerHTML = isSU
    ? 'Already have an account? <a href="#" onclick="setMode(\'login\');return false">Sign in</a>'
    : 'New here? <a href="#" onclick="setMode(\'signup\');return false">Create account</a>';
  // Hide tabs bar for forgot
  document.querySelector('.tabs').style.display = isFG ? 'none' : '';
}

function showForgot(){ setMode('forgot'); }

// ── PASSWORD STRENGTH ─────────────────────────────────────────────
function checkStrength(pw){
  var fill = document.getElementById('strength-fill');
  var label = document.getElementById('strength-label');
  if(!pw){ fill.style.width='0%'; label.textContent=''; return; }
  var score = 0;
  if(pw.length >= 8) score++;
  if(pw.length >= 12) score++;
  if(/[A-Z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^A-Za-z0-9]/.test(pw)) score++;
  var configs = [
    {w:'20%', bg:'#f44060', text:'Too short'},
    {w:'40%', bg:'#f59e0b', text:'Weak'},
    {w:'60%', bg:'#f59e0b', text:'Fair'},
    {w:'80%', bg:'#22d3a0', text:'Good'},
    {w:'100%',bg:'#22d3a0', text:'Strong'},
  ];
  var c = configs[Math.min(score, 4)];
  fill.style.width = c.w;
  fill.style.background = c.bg;
  label.textContent = c.text;
  label.style.color = c.bg;
}

// ── SHOW ERROR / SUCCESS ──────────────────────────────────────────
function showAlert(id, msg, type){
  var el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert ' + type + ' show';
}
function hideAlert(id){
  var el = document.getElementById(id);
  if(el) el.classList.remove('show');
}

// ── SIGN UP ───────────────────────────────────────────────────────
function handleSignup(){
  hideAlert('signup-error');
  var name  = document.getElementById('signup-name').value.trim();
  var email = document.getElementById('signup-email').value.trim().toLowerCase();
  var pw    = document.getElementById('signup-password').value;
  var btn   = document.getElementById('signup-btn');

  if(!name){ showAlert('signup-error','Please enter your name.','error'); return; }
  if(!email || !email.includes('@')){ showAlert('signup-error','Please enter a valid email.','error'); return; }
  if(pw.length < 8){ showAlert('signup-error','Password must be at least 8 characters.','error'); return; }

  var users = getUsers();
  if(users.find(function(u){ return u.email === email; })){
    showAlert('signup-error','An account with this email already exists. <a href="#" onclick="setMode(\'login\');return false" style="color:#f44060;text-decoration:underline">Sign in instead</a>.','error');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Creating account…';

  setTimeout(function(){
    var newUser = {
      id: 'u_' + Date.now(),
      name: name,
      email: email,
      passwordHash: hashPassword(pw),
      createdAt: new Date().toISOString(),
    };
    users.push(newUser);
    saveUsers(users);
    saveSession({ id: newUser.id, name: newUser.name, email: newUser.email });

    btn.innerHTML = '✓ Account created!';
    showAlert('signup-success', '✓ Welcome to MRT, ' + name + '! Taking you to your journal…', 'success');

    setTimeout(function(){
      window.location.href = 'MRT.html';
    }, 1200);
  }, 800);
}

// ── SIGN IN ───────────────────────────────────────────────────────
function handleLogin(){
  hideAlert('login-error');
  var email = document.getElementById('login-email').value.trim().toLowerCase();
  var pw    = document.getElementById('login-password').value;
  var btn   = document.getElementById('login-btn');

  if(!email || !email.includes('@')){ showAlert('login-error','Please enter your email.','error'); return; }
  if(!pw){ showAlert('login-error','Please enter your password.','error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';

  setTimeout(function(){
    var users = getUsers();
    var user = users.find(function(u){ return u.email === email; });

    if(!user || user.passwordHash !== hashPassword(pw)){
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
      showAlert('login-error','Incorrect email or password. Please try again.','error');
      document.getElementById('login-password').classList.add('error');
      setTimeout(function(){ document.getElementById('login-password').classList.remove('error'); }, 2000);
      return;
    }

    saveSession({ id: user.id, name: user.name, email: user.email });
    btn.innerHTML = '✓ Signed in!';
    setTimeout(function(){ window.location.href = 'MRT.html'; }, 800);
  }, 600);
}

// ── FORGOT PASSWORD ───────────────────────────────────────────────
function handleForgot(){
  var email = document.getElementById('forgot-email').value.trim().toLowerCase();
  if(!email || !email.includes('@')){ return; }
  // In production: call Supabase auth.resetPasswordForEmail(email)
  showAlert('forgot-success', '✓ If an account exists for ' + email + ', a reset link has been sent.', 'success');
  setTimeout(function(){ setMode('login'); }, 3000);
}

// ── KEYBOARD SUBMIT ───────────────────────────────────────────────
document.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    var su = document.getElementById('form-signup');
    var li = document.getElementById('form-login');
    if(su && su.style.display !== 'none') handleSignup();
    else if(li && li.style.display !== 'none') handleLogin();
  }
});
</script>
</body>
</html>
